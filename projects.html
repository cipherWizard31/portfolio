    <style>
      /* ── Page-level layout for the standalone projects page ── */
      body { font-family: "Open Sans", sans-serif; color: #272829; }

      #projects-page-header {
        background: #fff;
        border-bottom: 1px solid #e6e9ec;
        padding: 18px 0;
        position: sticky;
        top: 0;
        z-index: 9997;
        box-shadow: 0 2px 12px rgba(0,0,0,.06);
      }

      #projects-page-header .header-inner {
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      #projects-page-header .brand {
        font-family: "Raleway", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #45505b;
        text-decoration: none;
        white-space: nowrap;
      }

      #projects-page-header .brand:hover { color: #0563bb; text-decoration: none; }

      #projects-page-header .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #0563bb;
        text-decoration: none;
        font-family: "Raleway", sans-serif;
        transition: gap 0.2s;
      }

      #projects-page-header .back-link:hover { gap: 10px; text-decoration: none; }

      #projects-page-main {
        padding: 60px 0 80px;
      }

      .projects-page-title {
        text-align: center;
        margin-bottom: 50px;
      }

      .projects-page-title h1 {
        font-family: "Raleway", sans-serif;
        font-size: 32px;
        font-weight: 700;
        text-transform: uppercase;
        color: #45505b;
        margin-bottom: 20px;
        padding-bottom: 20px;
        position: relative;
      }

      .projects-page-title h1::before {
        content: "";
        position: absolute;
        display: block;
        width: 120px;
        height: 1px;
        background: #ddd;
        bottom: 1px;
        left: calc(50% - 60px);
      }

      .projects-page-title h1::after {
        content: "";
        position: absolute;
        display: block;
        width: 40px;
        height: 3px;
        background: #0563bb;
        bottom: 0;
        left: calc(50% - 20px);
      }

      .projects-page-title p {
        color: #6c757d;
        max-width: 600px;
        margin: 0 auto;
        font-size: 15px;
        line-height: 1.7;
      }

      /* Count badge */
      .projects-count {
        display: inline-block;
        background: #0563bb;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        font-family: "Poppins", sans-serif;
        border-radius: 50px;
        padding: 3px 11px;
        margin-left: 8px;
        vertical-align: middle;
        position: relative;
        top: -2px;
      }

      /* Footer */
      #projects-page-footer {
        background: #f5f6f7;
        border-top: 1px solid #e6e9ec;
        padding: 28px 0;
        text-align: center;
      }

      #projects-page-footer p {
        margin: 0;
        font-size: 14px;
        color: #6c757d;
      }

      #projects-page-footer .social-links a {
        font-size: 20px;
        display: inline-block;
        color: #6c757d;
        margin: 0 8px;
        transition: color 0.3s;
      }

      #projects-page-footer .social-links a:hover { color: #0563bb; }

      #projects-page-main { background: #f5f8fd; }
    </style>
  </head>

  <body>

    <!-- ======= Page Header ======= -->
    <header id="projects-page-header">
      <div class="header-inner">
        <a href="index.html" class="brand">Natan Yidnekachew</a>
        <a href="index.html#portfolio" class="back-link">
          <i class="bi bi-arrow-left-short" style="font-size:18px;"></i>
          Back to Portfolio
        </a>
      </div>
    </header>
    <!-- End Page Header -->

    <!-- ======= Main Content ======= -->
    <main id="projects-page-main" class="portfolio">
      <div class="container">

        <div class="projects-page-title" data-aos="fade-up">
          <h1>
            All Projects
            <span class="projects-count" id="projects-total">–</span>
          </h1>
          <p>
            A comprehensive list of web applications, platforms, and interactive interfaces built by Natan Yidnekachew.
          </p>
        </div>

        <!-- Grid injected by projects.js -->
        <div class="row portfolio-container" id="projects-grid-all"></div>

      </div>
    </main>
    <!-- End Main Content -->

    <!-- ======= Footer ======= -->
    <footer id="projects-page-footer">
      <div class="container">
        <div class="social-links mb-2">
          <a href="https://www.instagram.com/sapphire_coder" target="_blank" aria-label="Instagram">
            <i class="bx bxl-instagram"></i>
          </a>
          <a href="https://github.com/cipherWizard31" target="_blank" aria-label="GitHub">
            <i class="bx bxl-github"></i>
          </a>
          <a href="https://t.me/nathan_yidnekachew" target="_blank" aria-label="Telegram">
            <i class="bx bxl-telegram"></i>
          </a>
        </div>
        <p>&copy; 2025 Natan Yidnekachew. All rights reserved.</p>
      </div>
    </footer>
    <!-- End Footer -->

    <!-- Scripts -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js" integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/glightbox/3.3.0/js/glightbox.min.js" integrity="sha512-RBWI5Qf647bcVhqbEnRoL4KuUT+Liz+oG5jtF+HP05Oa5088M9G0GxG0uoHR9cyq35VbjahcI+Hd1xwY8E1/Kg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Projects data + renderer -->
    <script defer src="assets/js/projects.js"></script>

    <script>
      window.addEventListener('DOMContentLoaded', () => {
        // Show total projects count badge
        const countEl = document.getElementById('projects-total');
        if (countEl && typeof PROJECTS !== 'undefined') {
          countEl.textContent = PROJECTS.length;
        }

        // Init AOS
        if (typeof AOS !== 'undefined') {
          AOS.init({ duration: 800, easing: 'ease-in-out', once: true });
        }
      });
    </script>

  </body>
