  <head>
    <meta charset="utf-8" />

    <!-- Resource Hints -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Main CSS -->
    <link href="assets/css/style.css" rel="stylesheet" />

    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" integrity="sha512-dPXYcDub/aeb08c63jRq/k6GaKccl256JQy/AnOq7CAnEZ9FzSL9wSbcZkMp4R26vBsMLFYH4kQ67/bbV8XaCQ==" crossorigin="anonymous" />
    <link rel="preload" href="https://cdnjs.cloudflare.com/ajax/libs/boxicons/2.1.0/css/boxicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" integrity="sha512-pVCM5+SN2+qwj36KonHToF2p1oIvoU3bsqxphdOIWMYmgr4ZqD3t5DjKvvetKhXGc/ZG5REYTT6ltKfExEei/Q==" crossorigin="anonymous" />

    <style>
      /* ── Page-level layout for the standalone certificates page ── */
      body { font-family: "Open Sans", sans-serif; color: #272829; }

      #cert-page-header {
        background: #fff;
        border-bottom: 1px solid #e6e9ec;
        padding: 18px 0;
        position: sticky;
        top: 0;
        z-index: 9997;
        box-shadow: 0 2px 12px rgba(0,0,0,.06);
      }

      #cert-page-header .header-inner {
        max-width: 1140px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
      }

      #cert-page-header .brand {
        font-family: "Raleway", sans-serif;
        font-size: 20px;
        font-weight: 700;
        color: #45505b;
        text-decoration: none;
        white-space: nowrap;
      }

      #cert-page-header .brand:hover { color: #0563bb; text-decoration: none; }

      #cert-page-header .back-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        font-weight: 600;
        color: #0563bb;
        text-decoration: none;
        font-family: "Raleway", sans-serif;
        transition: gap 0.2s;
      }

      #cert-page-header .back-link:hover { gap: 10px; text-decoration: none; }

      #cert-page-main {
        padding: 60px 0 80px;
      }

      .cert-page-title {
        text-align: center;
        margin-bottom: 50px;
      }

      .cert-page-title h1 {
        font-family: "Raleway", sans-serif;
        font-size: 32px;
        font-weight: 700;
        text-transform: uppercase;
        color: #45505b;
        margin-bottom: 20px;
        padding-bottom: 20px;
        position: relative;
      }

      .cert-page-title h1::before {
        content: "";
        position: absolute;
        display: block;
        width: 120px;
        height: 1px;
        background: #ddd;
        bottom: 1px;
        left: calc(50% - 60px);
      }

      .cert-page-title h1::after {
        content: "";
        position: absolute;
        display: block;
        width: 40px;
        height: 3px;
        background: #0563bb;
        bottom: 0;
        left: calc(50% - 20px);
      }

      .cert-page-title p {
        color: #6c757d;
        max-width: 600px;
        margin: 0 auto;
        font-size: 15px;
        line-height: 1.7;
      }

      /* Count badge */
      .cert-count {
        display: inline-block;
        background: #0563bb;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        font-family: "Poppins", sans-serif;
        border-radius: 50px;
        padding: 3px 11px;
        margin-left: 8px;
        vertical-align: middle;
        position: relative;
        top: -2px;
      }

      /* Footer */
      #cert-page-footer {
        background: #f5f6f7;
        border-top: 1px solid #e6e9ec;
        padding: 28px 0;
        text-align: center;
      }

      #cert-page-footer p {
        margin: 0;
        font-size: 14px;
        color: #6c757d;
      }

      #cert-page-footer .social-links a {
        font-size: 20px;
        display: inline-block;
        color: #6c757d;
        margin: 0 8px;
        transition: color 0.3s;
      }

      #cert-page-footer .social-links a:hover { color: #0563bb; }

      /* Section-bg tint for alternate card rows */
      #cert-page-main { background: #f5f8fd; }
    </style>
  </head>

  <body>

    <!-- ======= Page Header ======= -->
    <header id="cert-page-header">
      <div class="header-inner">
        <a href="index.html" class="brand">Natan Yidnekachew</a>
        <a href="index.html#certificates" class="back-link">
          <i class="bi bi-arrow-left-short" style="font-size:18px;"></i>
          Back to Portfolio
        </a>
      </div>
    </header>
    <!-- End Page Header -->

    <!-- ======= Main Content ======= -->
    <main id="cert-page-main" class="portfolio">
      <div class="container">

        <div class="cert-page-title" data-aos="fade-up">
          <h1>
            All Certificates
            <span class="cert-count" id="cert-total">–</span>
          </h1>
          <p>
            A complete record of certifications earned across web development,
            artificial intelligence, data analysis, and more.
          </p>
        </div>

        <!-- Grid injected by certificates.js -->
        <div class="row portfolio-container" id="cert-grid-all"></div>

      </div>
    </main>
    <!-- End Main Content -->

    <!-- ======= Footer ======= -->
    <footer id="cert-page-footer">
      <div class="container">
        <div class="social-links mb-2">
          <a href="https://www.instagram.com/sapphire_coder" target="_blank" aria-label="Instagram">
            <i class="bx bxl-instagram"></i>
          </a>
          <a href="https://github.com/cipherWizard31" target="_blank" aria-label="GitHub">
            <i class="bx bxl-github"></i>
          </a>
          <a href="https://t.me/nathan_yidnekachew" target="_blank" aria-label="Telegram">
            <i class="bx bxl-telegram"></i>
          </a>
        </div>
        <p>&copy; 2025 Natan Yidnekachew. All rights reserved.</p>
      </div>
    </footer>
    <!-- End Footer -->

    <!-- Scripts -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js" integrity="sha512-7Pi/otdlbbCR+LnW+F7PwFcSDJOuUJB3OxtEHbg4vSMvzvJjde4Po1v4BR9Gdc9aXNUNFVUY+SK51wWT8WF0Gg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js" integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Certificates data + renderer -->
    <script defer src="assets/js/certificates.js"></script>

    <script defer>
      // Show total count badge (runs after certificates.js has rendered the grid)
      const countEl = document.getElementById('cert-total');
      if (countEl && typeof CERTIFICATES !== 'undefined') {
        countEl.textContent = CERTIFICATES.length;
      }
      // Init AOS animations
      if (typeof AOS !== 'undefined') {
        AOS.init({ duration: 800, easing: 'ease-in-out', once: true });
      }
    </script>

  </body>
</html>
